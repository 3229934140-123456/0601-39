<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创意设计平台 - 社媒活动视觉草图工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- 顶部工具栏 -->
    <header class="top-bar">
      <div class="top-bar-left">
        <div class="logo">🎨 DesignLab</div>
        <div class="size-selector">
          <select id="canvasSizeSelect">
            <option value="1080x1920">手机竖版 (1080×1920)</option>
            <option value="1080x1080" selected>方图 (1080×1080)</option>
            <option value="1920x1080">横版 (1920×1080)</option>
            <option value="800x800">小红书 (800×800)</option>
            <option value="750x1334">iPhone (750×1334)</option>
            <option value="custom">自定义尺寸...</option>
          </select>
        </div>
      </div>
      
      <div class="top-bar-center">
        <button class="tool-btn" id="undoBtn" title="撤销 (Ctrl+Z)">↶ 撤销</button>
        <button class="tool-btn" id="redoBtn" title="重做 (Ctrl+Y)">↷ 重做</button>
        <div class="divider-v"></div>
        <button class="tool-btn" id="alignLeftBtn" title="左对齐">⬅ 左对齐</button>
        <button class="tool-btn" id="alignCenterBtn" title="水平居中">↔ 水平居中</button>
        <button class="tool-btn" id="alignRightBtn" title="右对齐">➡ 右对齐</button>
        <button class="tool-btn" id="alignTopBtn" title="顶部对齐">⬆ 顶对齐</button>
        <button class="tool-btn" id="alignMiddleBtn" title="垂直居中">↕ 垂直居中</button>
        <button class="tool-btn" id="alignBottomBtn" title="底部对齐">⬇ 底对齐</button>
        <div class="divider-v"></div>
        <button class="tool-btn" id="distributeHBtn" title="水平分布">↔↔ 水平分布</button>
        <button class="tool-btn" id="distributeVBtn" title="垂直分布">↕↕ 垂直分布</button>
      </div>
      
      <div class="top-bar-right">
        <button class="tool-btn" id="mobilePreviewBtn" title="移动端预览">📱 预览</button>
        <button class="tool-btn" id="draftsBtn" title="我的草稿">📂 草稿</button>
        <button class="tool-btn primary" id="saveDraftBtn">💾 保存草稿</button>
        <button class="tool-btn primary" id="exportPngBtn">📤 导出 PNG</button>
        <button class="tool-btn primary" id="exportPdfBtn">📄 导出 PDF</button>
        <button class="tool-btn primary" id="batchExportBtn">📦 批量导出</button>
      </div>
    </header>

    <!-- 主体内容 -->
    <div class="main-content">
      <!-- 左侧面板 -->
      <aside class="left-panel">
        <div class="panel-tabs">
          <button class="tab-btn active" data-tab="templates">模板</button>
          <button class="tab-btn" data-tab="assets">素材</button>
          <button class="tab-btn" data-tab="text">文字</button>
          <button class="tab-btn" data-tab="colors">配色</button>
        </div>
        
        <!-- 模板面板 -->
        <div class="panel-content active" id="templates-panel">
          <div class="panel-search">
            <input type="text" id="templateSearch" placeholder="搜索模板...">
          </div>
          <div class="templates-grid" id="templatesGrid">
            <!-- 模板将通过 JS 动态生成 -->
          </div>
        </div>
        
        <!-- 素材面板 -->
        <div class="panel-content" id="assets-panel">
          <div class="assets-tabs">
            <button class="sub-tab-btn active" data-asset="images">🖼 图片</button>
            <button class="sub-tab-btn" data-asset="icons">🔷 图标</button>
            <button class="sub-tab-btn" data-asset="shapes">⬜ 形状</button>
          </div>
          <div class="assets-search-box" id="assetsSearchBox" style="display:none;">
            <input type="text" id="assetsSearch" placeholder="搜索素材...">
          </div>
          <div class="assets-sub-tabs" id="imageSubTabs" style="display:none;">
            <button class="sub-tab-btn small active" data-images-tab="all">全部</button>
            <button class="sub-tab-btn small" data-images-tab="mine">我的素材</button>
          </div>
          <div class="assets-grid" id="assetsGrid">
            <!-- 素材将通过 JS 动态生成 -->
          </div>
          <div class="upload-section">
            <label class="upload-btn">
              📁 上传本地图片
              <input type="file" id="uploadImage" accept="image/*" hidden multiple>
            </label>
          </div>
        </div>
        
        <!-- 文字面板 -->
        <div class="panel-content" id="text-panel">
          <div class="text-presets">
            <h4>文字预设</h4>
            <button class="text-preset-btn" data-type="title">
              <span class="preset-preview" style="font-size: 32px; font-weight: bold;">大标题</span>
            </button>
            <button class="text-preset-btn" data-type="subtitle">
              <span class="preset-preview" style="font-size: 22px; font-weight: 600;">副标题</span>
            </button>
            <button class="text-preset-btn" data-type="body">
              <span class="preset-preview" style="font-size: 16px;">正文内容</span>
            </button>
            <button class="text-preset-btn" data-type="caption">
              <span class="preset-preview" style="font-size: 12px; color: #666;">小字标注</span>
            </button>
          </div>
          
          <div class="text-properties" id="textProperties" style="display:none;">
            <h4>文字属性</h4>
            <div class="prop-group">
              <label>字号</label>
              <input type="range" id="fontSizeSlider" min="10" max="200" value="32">
              <span id="fontSizeValue">32px</span>
            </div>
            <div class="prop-group">
              <label>字重</label>
              <select id="fontWeightSelect">
                <option value="300">细体</option>
                <option value="400">常规</option>
                <option value="600">中粗</option>
                <option value="700" selected>粗体</option>
                <option value="900">特粗</option>
              </select>
            </div>
            <div class="prop-group">
              <label>字体</label>
              <select id="fontFamilySelect">
                <option value="'PingFang SC', 'Microsoft YaHei', sans-serif">苹方/微软雅黑</option>
                <option value="'SimHei', sans-serif">黑体</option>
                <option value="'SimSun', serif">宋体</option>
                <option value="'KaiTi', serif">楷体</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="'Courier New', monospace">Courier</option>
              </select>
            </div>
            <div class="prop-group">
              <label>对齐</label>
              <div class="align-btns">
                <button class="mini-btn" data-align="left">⬅</button>
                <button class="mini-btn active" data-align="center">↔</button>
                <button class="mini-btn" data-align="right">➡</button>
              </div>
            </div>
            <div class="prop-group">
              <label>文字颜色</label>
              <input type="color" id="textColorPicker" value="#333333">
            </div>
            <div class="prop-group">
              <label>行高</label>
              <input type="range" id="lineHeightSlider" min="0.8" max="3" step="0.1" value="1.4">
              <span id="lineHeightValue">1.4</span>
            </div>
            <div class="prop-group">
              <label>字间距</label>
              <input type="range" id="letterSpacingSlider" min="-5" max="20" value="0">
              <span id="letterSpacingValue">0px</span>
            </div>
          </div>
        </div>
        
        <!-- 配色面板 -->
        <div class="panel-content" id="colors-panel">
          <div class="colors-section">
            <h4>品牌色板</h4>
            <div class="color-palette" id="brandPalette">
              <!-- 品牌色将通过 JS 生成 -->
            </div>
          </div>
          
          <div class="colors-section">
            <h4>流行配色</h4>
            <div class="color-schemes" id="popularSchemes">
              <!-- 配色方案将通过 JS 生成 -->
            </div>
          </div>
          
          <div class="colors-section">
            <h4>我的收藏</h4>
            <div class="color-palette" id="savedColors">
              <!-- 收藏的颜色将通过 JS 生成 -->
            </div>
            <button class="add-color-btn" id="addSavedColorBtn">+ 添加当前颜色</button>
          </div>
          
          <div class="colors-section">
            <h4>取色器</h4>
            <div class="color-picker-wrapper">
              <input type="color" id="mainColorPicker" value="#FF6B6B">
              <div class="color-info">
                <span id="colorHex">#FF6B6B</span>
                <button class="copy-btn" id="copyColorBtn">复制</button>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- 中间画布区域 -->
      <main class="canvas-area">
        <div class="canvas-wrapper" id="canvasWrapper">
          <div class="canvas-container" id="canvasContainer">
            <div class="design-canvas" id="designCanvas">
              <!-- 画布内容将通过 JS 动态生成 -->
            </div>
          </div>
        </div>
        
        <!-- 缩放控制 -->
        <div class="zoom-controls">
          <button class="zoom-btn" id="zoomOutBtn">−</button>
          <span id="zoomLevel">100%</span>
          <button class="zoom-btn" id="zoomInBtn">+</button>
          <button class="zoom-btn" id="zoomFitBtn">适配</button>
        </div>
      </main>

      <!-- 右侧图层面板 -->
      <aside class="right-panel">
        <div class="panel-header">
          <h3>图层</h3>
          <div class="layer-actions">
            <button class="mini-btn" id="moveUpBtn" title="上移一层">⬆</button>
            <button class="mini-btn" id="moveDownBtn" title="下移一层">⬇</button>
            <button class="mini-btn danger" id="deleteLayerBtn" title="删除">🗑</button>
          </div>
        </div>
        
        <div class="layers-list" id="layersList">
          <!-- 图层列表将通过 JS 动态生成 -->
        </div>
        
        <!-- 属性面板 -->
        <div class="properties-panel" id="propertiesPanel">
          <h4>属性</h4>
          <div class="image-actions" id="imageActions" style="display:none; margin-bottom:12px;">
            <button class="btn-secondary btn-sm" id="cropImageBtn" style="flex:1; margin-right:4px;">✂ 裁剪</button>
            <button class="btn-secondary btn-sm" id="replaceImageBtn" style="flex:1; margin-right:4px;">🔄 替换</button>
            <button class="btn-secondary btn-sm" id="favoriteImageBtn" style="flex:1;">⭐ 收藏</button>
            <input type="file" id="replaceImageInput" accept="image/*" style="display:none;">
          </div>
          <div class="prop-group">
            <label>X 坐标</label>
            <input type="number" id="posXInput">
          </div>
          <div class="prop-group">
            <label>Y 坐标</label>
            <input type="number" id="posYInput">
          </div>
          <div class="prop-group">
            <label>宽度</label>
            <input type="number" id="widthInput">
          </div>
          <div class="prop-group">
            <label>高度</label>
            <input type="number" id="heightInput">
          </div>
          <div class="prop-group">
            <label>透明度</label>
            <input type="range" id="opacitySlider" min="0" max="100" value="100">
            <span id="opacityValue">100%</span>
          </div>
          <div class="prop-group">
            <label>旋转</label>
            <input type="number" id="rotationInput" value="0">
            <span>°</span>
          </div>
        </div>
      </aside>
    </div>

    <!-- 移动端预览模态框 -->
    <div class="modal-overlay" id="mobilePreviewModal" style="display:none;">
      <div class="modal-content mobile-preview-content">
        <div class="modal-header">
          <h3>移动端预览</h3>
          <button class="close-btn" id="closeMobilePreview">✕</button>
        </div>
        <div class="mobile-frame">
          <div class="mobile-screen" id="mobilePreviewScreen">
            <!-- 预览内容 -->
          </div>
        </div>
      </div>
    </div>

    <!-- 批量导出模态框 -->
    <div class="modal-overlay" id="batchExportModal" style="display:none;">
      <div class="modal-content batch-export-modal">
        <div class="modal-header">
          <h3>批量导出多尺寸</h3>
          <button class="close-btn" id="closeBatchExport">✕</button>
        </div>
        <div class="batch-export-container">
          <div class="batch-size-sidebar">
            <div class="sidebar-title">选择尺寸</div>
            <div class="batch-sizes-list" id="batchSizesList">
              <!-- 尺寸选项 -->
            </div>
          </div>
          <div class="batch-preview-area">
            <div class="preview-header">
              <span class="preview-size-name" id="batchPreviewSizeName">方图 (1080×1080)</span>
              <div class="preview-actions-top">
                <label class="safe-zone-toggle">
                  <input type="checkbox" id="showSafeZone" checked> 安全区
                </label>
                <span class="overflow-warning" id="overflowWarning" style="display:none;">
                  ⚠ 有内容越界
                </span>
              </div>
            </div>
            <div class="batch-preview-canvas-wrapper" id="batchPreviewWrapper">
              <div class="batch-preview-canvas" id="batchPreviewCanvas">
                <div class="safe-zone" id="safeZoneOverlay"></div>
                <!-- 预览内容 -->
              </div>
            </div>
            <div class="preview-actions">
              <button class="btn-secondary btn-sm" id="snapToSafeBtn">📌 吸附到安全区</button>
              <button class="btn-secondary btn-sm" id="resetSizeBtn">重置此尺寸</button>
              <button class="btn-secondary btn-sm" id="applyToAllBtn">应用到全部</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="cancelBatchExport">取消</button>
          <button class="btn-primary" id="confirmBatchExport">开始导出</button>
        </div>
      </div>
    </div>

    <!-- 自定义尺寸模态框 -->
    <div class="modal-overlay" id="customSizeModal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>自定义画布尺寸</h3>
          <button class="close-btn" id="closeCustomSize">✕</button>
        </div>
        <div class="custom-size-form">
          <div class="prop-group">
            <label>宽度 (px)</label>
            <input type="number" id="customWidth" value="1080">
          </div>
          <div class="prop-group">
            <label>高度 (px)</label>
            <input type="number" id="customHeight" value="1080">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="cancelCustomSize">取消</button>
          <button class="btn-primary" id="confirmCustomSize">确定</button>
        </div>
      </div>
    </div>

    <!-- 草稿管理模态框 -->
    <div class="modal-overlay" id="draftsModal" style="display:none;">
      <div class="modal-content drafts-modal">
        <div class="modal-header">
          <h3>我的草稿</h3>
          <button class="close-btn" id="closeDrafts">✕</button>
        </div>
        <div class="drafts-toolbar">
          <input type="text" id="draftSearch" placeholder="搜索草稿..." class="draft-search-input">
        </div>
        <div class="drafts-list" id="draftsList">
          <!-- 草稿列表 -->
        </div>
      </div>
    </div>

    <!-- 保存草稿确认模态框 -->
    <div class="modal-overlay" id="saveDraftModal" style="display:none;">
      <div class="modal-content" style="width: 400px;">
        <div class="modal-header">
          <h3>保存草稿</h3>
          <button class="close-btn" id="closeSaveDraft">✕</button>
        </div>
        <div class="save-draft-form">
          <div class="prop-group">
            <label>草稿名称</label>
            <input type="text" id="draftNameInput" placeholder="请输入草稿名称">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="cancelSaveDraft">取消</button>
          <button class="btn-secondary" id="saveAsNewDraftBtn">另存为新草稿</button>
          <button class="btn-primary" id="confirmSaveDraftBtn">覆盖当前草稿</button>
        </div>
      </div>
    </div>

    <!-- 图片裁剪模态框 -->
    <div class="modal-overlay" id="cropImageModal" style="display:none;">
      <div class="modal-content crop-modal">
        <div class="modal-header">
          <h3>裁剪图片</h3>
          <button class="close-btn" id="closeCropModal">✕</button>
        </div>
        <div class="crop-container">
          <div class="crop-area" id="cropArea">
            <div class="crop-image-wrapper" id="cropImageWrapper">
              <img id="cropImage" draggable="false">
            </div>
            <div class="crop-box" id="cropBox">
              <div class="crop-handle crop-handle-nw" data-handle="nw"></div>
              <div class="crop-handle crop-handle-n" data-handle="n"></div>
              <div class="crop-handle crop-handle-ne" data-handle="ne"></div>
              <div class="crop-handle crop-handle-w" data-handle="w"></div>
              <div class="crop-handle crop-handle-e" data-handle="e"></div>
              <div class="crop-handle crop-handle-sw" data-handle="sw"></div>
              <div class="crop-handle crop-handle-s" data-handle="s"></div>
              <div class="crop-handle crop-handle-se" data-handle="se"></div>
            </div>
            <div class="crop-overlay crop-overlay-top"></div>
            <div class="crop-overlay crop-overlay-bottom"></div>
            <div class="crop-overlay crop-overlay-left"></div>
            <div class="crop-overlay crop-overlay-right"></div>
          </div>
          <div class="crop-controls">
            <div class="crop-control-group">
              <label>裁剪比例</label>
              <div class="crop-ratio-buttons">
                <button class="ratio-btn active" data-ratio="free">自由</button>
                <button class="ratio-btn" data-ratio="1:1">1:1</button>
                <button class="ratio-btn" data-ratio="4:5">4:5</button>
                <button class="ratio-btn" data-ratio="16:9">16:9</button>
              </div>
            </div>
            <div class="crop-control-group">
              <label>缩放</label>
              <input type="range" id="cropZoomSlider" min="10" max="300" value="100">
              <span id="cropZoomValue">100%</span>
            </div>
            <div class="crop-control-group">
              <label>裁剪尺寸</label>
              <span id="cropSizeInfo">0 × 0</span>
            </div>
            <div class="crop-control-group">
              <button class="btn-secondary btn-sm" id="resetCropBtn">重置</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="cancelCropBtn">取消</button>
          <button class="btn-primary" id="confirmCropBtn">确认裁剪</button>
        </div>
      </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
